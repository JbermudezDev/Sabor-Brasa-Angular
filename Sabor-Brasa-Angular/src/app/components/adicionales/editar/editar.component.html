<div class="form-container">
    <h2>Editar Adicional</h2>
    <form (ngSubmit)="updateAdicional()">
      <div class="form-group">
        <label>Nombre:</label>
        <input type="text" [(ngModel)]="adicional.nombre" name="nombre" required>
      </div>
      <div class="form-group">
        <label>Precio:</label>
        <input type="number" [(ngModel)]="adicional.precio" name="precio" required>
      </div>
      <div class="form-group">
        <label>Descripción:</label>
        <input type="text" [(ngModel)]="adicional.descripcion" name="descripcion" required>
      </div>
      <button type="submit">Actualizar Adicional</button>
    </form>
  </div>
